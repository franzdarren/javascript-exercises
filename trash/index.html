<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>Live Server - Demo</title>
		<style>
			body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#f6f8fa}
			.card{background:#fff;padding:24px;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,.06);min-width:300px}
			button{padding:8px 12px;border-radius:6px;border:1px solid #ddd;background:#0078d4;color:#fff;cursor:pointer}
		</style>
	</head>
	<body>
		<div class="card">
			<h1 id="title">Hello from index.js</h1>
			<p>Current time: <span id="time">--:--:--</span></p>
			<p>
				<button id="updateBtn">Update message</button>
			</p>
		</div>

		<script src="index.js"></script>
	</body>
</html>
